# Prevent usbhid from binding to MonsGeek M5W keyboard interfaces.
#
# The yc3121 firmware STALLs on HID report descriptor reads for IF1/IF2,
# causing 26-second timeouts that block the entire USB device including
# IF0 (keyboard input). HID_QUIRK_IGNORE prevents usbhid from probing
# any interface, eliminating the STALL entirely.
#
# The monsgeek-transport userspace driver handles all interfaces:
# - IF0: boot keyboard input via interrupt transfers
# - IF2: vendor commands via control transfers
#
# VID/PID from crates/monsgeek-protocol/devices/m5w.json
#
# Install: sudo cp monsgeek-hid-usbhid.conf /etc/modprobe.d/
# Activate: reboot (usbhid is built into the kernel on Fedora)
options usbhid quirks=0x3151:0x4015:0x0010
